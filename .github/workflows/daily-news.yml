name: Daily Tech News

on:
  schedule:
    # 每天 UTC 00:00 = CST 08:00（北京时间）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: read

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run news collector
        shell: pwsh
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: |
          pwsh ./daily_news.ps1 -SendKey "$env:SENDKEY"
