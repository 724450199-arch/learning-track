name: Daily Learning Reminder

on:
  schedule:
    # 每天 19:00 CST = 11:00 UTC
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  learning:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "Learning Bot"
          git config user.email "bot@learning-track"

      - name: Run daily learning script
        shell: pwsh
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          pwsh ./daily_learning.ps1

      - name: Push to Gitee
        if: always()
        run: |
          git remote add gitee https://oauth2:${{ secrets.GITEE_TOKEN }}@gitee.com/yql8981229/learning-track.git
          git push gitee
