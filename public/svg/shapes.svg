<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#FEF9E7"/>
    </linearGradient>
    <linearGradient id="b1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#EE5A24"/>
    </linearGradient>
    <linearGradient id="b2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ECDC4"/>
      <stop offset="100%" stop-color="#00B894"/>
    </linearGradient>
    <linearGradient id="b3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDCB6E"/>
      <stop offset="100%" stop-color="#E17055"/>
    </linearGradient>
    <linearGradient id="b4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#74B9FF"/>
      <stop offset="100%" stop-color="#0984E3"/>
    </linearGradient>
    <linearGradient id="b5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A29BFE"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2C3E50"/>
    </marker>
  </defs>

  <rect width="900" height="620" fill="url(#bg)" rx="12"/>

  <text x="450" y="42" text-anchor="middle" font-family="'Microsoft YaHei','Comic Sans MS',sans-serif" font-size="26" font-weight="bold" fill="#2C3E50">🔷 认识图形</text>
  <text x="450" y="64" text-anchor="middle" font-family="'Microsoft YaHei','Comic Sans MS',sans-serif" font-size="14" fill="#7F8C8D">正方形 · 长方形 · 平行四边形 · 菱形</text>

  <!-- ===== Square 正方形 ===== -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="140" height="140" rx="4" fill="url(#b1)" opacity="0.85" filter="url(#shadow)"/>
    <text x="70" y="72" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="14" fill="#FFF" font-weight="bold">正方形</text>
    <text x="70" y="92" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,.85)">Square</text>
    <!-- side markers -->
    <line x1="0" y1="-8" x2="140" y2="-8" stroke="#FFF" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <text x="70" y="-12" text-anchor="middle" font-family="Arial" font-size="10" fill="#2C3E50">边</text>
    <!-- right angle marks -->
    <polyline points="8,0 8,8 0,8" fill="none" stroke="#FFF" stroke-width="1.5"/>
    <polyline points="132,0 132,8 140,8" fill="none" stroke="#FFF" stroke-width="1.5"/>
    <polyline points="0,132 8,132 8,140" fill="none" stroke="#FFF" stroke-width="1.5"/>
    <polyline points="140,132 132,132 132,140" fill="none" stroke="#FFF" stroke-width="1.5"/>
    <text x="70" y="170" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#555">四边相等 · 四个直角</text>
  </g>

  <!-- ===== Rectangle 长方形 ===== -->
  <g transform="translate(250, 100)">
    <rect x="0" y="0" width="190" height="110" rx="4" fill="url(#b2)" opacity="0.85" filter="url(#shadow)"/>
    <text x="95" y="58" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="14" fill="#FFF" font-weight="bold">长方形</text>
    <text x="95" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,.85)">Rectangle</text>
    <polyline points="8,0 8,8 0,8" fill="none" stroke="#FFF" stroke-width="1.5"/>
    <polyline points="182,0 182,8 190,8" fill="none" stroke="#FFF" stroke-width="1.5"/>
    <polyline points="0,102 8,102 8,110" fill="none" stroke="#FFF" stroke-width="1.5"/>
    <polyline points="190,102 182,102 182,110" fill="none" stroke="#FFF" stroke-width="1.5"/>
    <text x="95" y="140" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#555">对边相等 · 四个直角</text>
  </g>

  <!-- ===== Parallelogram 平行四边形 ===== -->
  <g transform="translate(490, 100)">
    <polygon points="50,0 240,0 190,110 0,110" fill="url(#b3)" opacity="0.85" filter="url(#shadow)"/>
    <text x="120" y="58" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="14" fill="#FFF" font-weight="bold">平行四边形</text>
    <text x="120" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,.85)">Parallelogram</text>
    <!-- parallel markers -->
    <line x1="15" y1="105" x2="20" y2="100" stroke="#FFF" stroke-width="1"/>
    <line x1="20" y1="105" x2="25" y2="100" stroke="#FFF" stroke-width="1"/>
    <line x1="225" y1="5" x2="230" y2="0" stroke="#FFF" stroke-width="1"/>
    <line x1="230" y1="5" x2="235" y2="0" stroke="#FFF" stroke-width="1"/>
    <text x="120" y="140" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#555">对边平行且相等 · 对角相等</text>
  </g>

  <!-- ===== Rhombus 菱形 ===== -->
  <g transform="translate(740, 100)">
    <polygon points="70,0 140,70 70,140 0,70" fill="url(#b4)" opacity="0.85" filter="url(#shadow)"/>
    <text x="70" y="68" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="14" fill="#FFF" font-weight="bold">菱形</text>
    <text x="70" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,.85)">Rhombus</text>
    <line x1="70" y1="0" x2="70" y2="-8" stroke="#FFF" stroke-width="1.5"/>
    <line x1="70" y1="140" x2="70" y2="148" stroke="#FFF" stroke-width="1.5"/>
    <text x="70" y="-16" text-anchor="middle" font-family="Arial" font-size="10" fill="#2C3E50">对角线</text>
    <text x="70" y="172" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#555">四边相等 · 对角线垂直</text>
  </g>

  <!-- ===== Row 2: Triangle + Pentagon + Circle + More ===== -->

  <!-- Triangle -->
  <g transform="translate(60, 320)">
    <polygon points="70,0 140,120 0,120" fill="url(#b5)" opacity="0.85" filter="url(#shadow)"/>
    <text x="70" y="68" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="14" fill="#FFF" font-weight="bold">三角形</text>
    <text x="70" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,.85)">Triangle</text>
    <text x="70" y="150" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#555">三条边 · 内角和 180°</text>
  </g>

  <!-- Pentagon -->
  <g transform="translate(270, 320)">
    <polygon points="60,10 112,48 92,110 28,110 8,48" fill="url(#b1)" opacity="0.85" filter="url(#shadow)"/>
    <text x="60" y="72" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="14" fill="#FFF" font-weight="bold">五边形</text>
    <text x="60" y="92" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,.85)">Pentagon</text>
    <text x="60" y="158" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#555">五条边</text>
  </g>

  <!-- Trapezoid -->
  <g transform="translate(470, 320)">
    <polygon points="20,0 180,0 240,120 0,120" fill="url(#b2)" opacity="0.85" filter="url(#shadow)"/>
    <text x="120" y="62" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="14" fill="#FFF" font-weight="bold">梯形</text>
    <text x="120" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,.85)">Trapezoid</text>
    <line x1="10" y1="115" x2="15" y2="110" stroke="#FFF" stroke-width="1"/>
    <line x1="15" y1="115" x2="20" y2="110" stroke="#FFF" stroke-width="1"/>
    <line x1="170" y1="5" x2="175" y2="0" stroke="#FFF" stroke-width="1"/>
    <line x1="175" y1="5" x2="180" y2="0" stroke="#FFF" stroke-width="1"/>
    <text x="120" y="148" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#555">一组对边平行</text>
  </g>

  <!-- Circle -->
  <g transform="translate(760, 320)">
    <circle cx="60" cy="60" r="60" fill="url(#b3)" opacity="0.85" filter="url(#shadow)"/>
    <text x="60" y="58" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="14" fill="#FFF" font-weight="bold">圆形</text>
    <text x="60" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,.85)">Circle</text>
    <!-- radius line -->
    <line x1="60" y1="60" x2="110" y2="60" stroke="#FFF" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="85" y="55" text-anchor="middle" font-family="Arial" font-size="9" fill="#FFF">r</text>
    <text x="60" y="150" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#555">没有角 · 没有边</text>
  </g>

  <!-- Bottom summary bar -->
  <rect x="100" y="510" width="700" height="48" rx="10" fill="#FFF" opacity="0.88" filter="url(#shadow)"/>
  <text x="450" y="530" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="12" fill="#2C3E50">
    📐 四边形：正方形 · 长方形 · 平行四边形 · 菱形 · 梯形 ｜ 三边：三角形 ｜ 五边：五边形 ｜ 无角：圆形
  </text>
  <text x="450" y="548" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#7F8C8D">
    内角和公式：(n-2) × 180° （n = 边数）
  </text>

  <text x="860" y="600" text-anchor="end" font-family="Arial" font-size="10" fill="#BDC3C7">🎯 生图技能</text>
</svg>
