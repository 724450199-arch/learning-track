  <text x="297" y="408" font-size="17" font-weight="bold" fill="#BF360C" text-anchor="middle">&#x270F;&#xFE0F; 汉字描红 · 每个字描3遍</text>  <text x='297' y='445' font-size='30' fill='#CFD8DC' text-anchor='middle' font-family='STKaiti,serif' font-weight='bold'>人  人  人  人  人</text>  <text x='297' y='487' font-size='30' fill='#CFD8DC' text-anchor='middle' font-family='STKaiti,serif' font-weight='bold'>口  口  口  口  口</text>  <text x='297' y='529' font-size='30' fill='#CFD8DC' text-anchor='middle' font-family='STKaiti,serif' font-weight='bold'>手  手  手  手  手</text>  <text x='297' y='571' font-size='30' fill='#CFD8DC' text-anchor='middle' font-family='STKaiti,serif' font-weight='bold'>大  大  大  大  大</text>  <text x='297' y='613' font-size='30' fill='#CFD8DC' text-anchor='middle' font-family='STKaiti,serif' font-weight='bold'>小  小  小  小  小</text>  <rect x="30" y="660" width="535" height="230" rx="10" fill="url(#cs3)" stroke="#9FA8DA" stroke-width="1.5"/>  <text x="297" y="685" font-size="15" font-weight="bold" fill="#283593" text-anchor="middle">&#x1F4DA; 悯农（其二） — 李绅</text>  <text x="80" y="709" font-size="16" fill="#333" font-family="STKaiti,serif">春种一粒粟，秋收万颗子。</text>  <text x="80" y="731" font-size="16" fill="#333" font-family="STKaiti,serif">四海无闲田，农夫犹饿死。</text>  <text x="297" y="763" font-size="15" font-weight="bold" fill="#283593" text-anchor="middle">&#x1F4DA; 咏鹅 — 骆宾王</text>  <text x="80" y="787" font-size="16" fill="#333" font-family="STKaiti,serif">鹅鹅鹅，曲项向天歌。</text>  <text x="80" y="809" font-size="16" fill="#333" font-family="STKaiti,serif">白毛浮绿水，红掌拨清波。</text>  <rect x="30" y="905" width="535" height="55" rx="10" fill="#FFCC02" opacity="0.2"/>
