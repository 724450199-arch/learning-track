  <text x="297" y="208" font-size="12" fill="#78909C" text-anchor="middle">(在横线上填入正确的单词)</text>
  <text x="60" y="245" font-size="16" fill="#333" font-family="monospace">1. c<tspan fill="#E53935" font-weight="bold">__</tspan>e (蛋糕)</text>
