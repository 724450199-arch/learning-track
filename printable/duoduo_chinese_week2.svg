  <text x="297" y="430" font-size="20" font-weight="bold" fill="#BF360C" text-anchor="middle">&#x270F;&#xFE0F; 汉字描红 · 每个字描3遍</text>  <text x='297' y='470' font-size='36' fill='#CFD8DC' text-anchor='middle' font-family='STKaiti,serif' font-weight='bold'>上  上  上  上  上</text>  <text x='297' y='520' font-size='36' fill='#CFD8DC' text-anchor='middle' font-family='STKaiti,serif' font-weight='bold'>下  下  下  下  下</text>  <text x='297' y='570' font-size='36' fill='#CFD8DC' text-anchor='middle' font-family='STKaiti,serif' font-weight='bold'>天  天  天  天  天</text>  <text x='297' y='620' font-size='36' fill='#CFD8DC' text-anchor='middle' font-family='STKaiti,serif' font-weight='bold'>地  地  地  地  地</text>  <rect x="30" y="675" width="535" height="250" rx="10" fill="url(#cs3)" stroke="#9FA8DA" stroke-width="1.5"/>  <text x="297" y="700" font-size="17" font-weight="bold" fill="#283593" text-anchor="middle">&#x1F4DA; 古朗月行（节选） — 李白</text>  <text x="80" y="726" font-size="19" fill="#333" font-family="STKaiti,serif">小时不识月，呼作白玉盘。</text>  <text x="80" y="752" font-size="19" fill="#333" font-family="STKaiti,serif">又疑瑶台镜，飞在青云端。</text>  <text x="297" y="788" font-size="17" font-weight="bold" fill="#283593" text-anchor="middle">&#x1F4DA; 池上 — 白居易</text>  <text x="80" y="814" font-size="19" fill="#333" font-family="STKaiti,serif">小娃撑小艇，偷采白莲回。</text>  <text x="80" y="840" font-size="19" fill="#333" font-family="STKaiti,serif">不解藏踪迹，浮萍一道开。</text>  <rect x="30" y="940" width="535" height="65" rx="10" fill="#FFCC02" opacity="0.2"/>
